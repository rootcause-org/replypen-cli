# Cut a release: `git tag v0.1.0 && git push origin v0.1.0`. GoReleaser cross-compiles and attaches
# the binaries + checksums to the GitHub Release for that tag — no Go needed to install `rp`.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # upload release assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      # The Homebrew cask publish needs a token with contents:write on the separate
      # homebrew-replypen repo (GITHUB_TOKEN is scoped to THIS repo only). Until that
      # secret is set, skip the cask step so binaries + checksums still publish and the
      # workflow stays green; it auto-enables the moment the secret exists.
      - id: flags
        run: |
          if [ -z "${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}" ]; then
            echo "extra=--skip=homebrew" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_GITHUB_TOKEN unset — skipping the Homebrew cask publish (binaries still ship)."
          else
            echo "extra=" >> "$GITHUB_OUTPUT"
          fi
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean ${{ steps.flags.outputs.extra }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lets GoReleaser push the Homebrew cask to rootcause-org/homebrew-replypen (see .goreleaser.yaml):
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
